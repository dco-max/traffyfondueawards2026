                        <body>
                            <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traffy Fondue Awards 2026 - Photo Booth</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'nstda-blue': '#1e3a8a',  // Deep Blue
                        'nstda-silver': '#cbd5e1', // Silver
                        'traffy-brown': '#714727', // Traffy Brown
                    },
                    fontFamily: {
                        prompt: ['Prompt', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .font-en { font-family: 'Montserrat', sans-serif; }
        
        /* ซ่อน Scrollbar สำหรับเมนูเลื่อนแนวนอน */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* สไตล์กรอบ Canvas */
        #canvas-wrapper {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background-color: #e2e8f0;
            touch-action: none; /* ป้องกันการเลื่อนหน้าจอเวลาลากรูป */
        }
        
        canvas {
            width: 100%;
            height: auto;
            max-width: 500px;
            display: block;
            margin: 0 auto;
        }

        /* ตกแต่ง Input Range (Zoom) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%;
            background: #714727;
            cursor: pointer;
            margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-nstda-blue text-slate-800 pb-10">

    <!-- Header -->
    <header class="text-center pt-8 pb-6 px-4">
        <h1 class="text-3xl font-bold text-white font-en mb-2 tracking-wide">Traffy Fondue Awards</h1>
        <p class="text-nstda-silver text-sm">สร้างกรอบรูปที่ระลึกเพื่อฉลองความสำเร็จร่วมกัน</p>
    </header>

    <!-- Main App Container -->
    <main class="max-w-lg mx-auto bg-white rounded-3xl p-5 shadow-2xl mx-4">
        
        <!-- Upload Section -->
        <div id="upload-section" class="text-center mb-6">
            <label for="image-upload" class="bg-traffy-brown text-white px-6 py-3 rounded-full font-medium inline-block cursor-pointer shadow-lg hover:bg-opacity-90 transition w-full">
                📸 ถ่ายภาพ / อัปโหลด
            </label>
            <input type="file" id="image-upload" accept="image/*" class="hidden">
        </div>

        <!-- Canvas Area -->
        <div id="editor-section" class="hidden flex flex-col items-center">
            <p class="text-sm text-gray-500 mb-2 text-center w-full">👆 ใช้นิ้วเลื่อนเพื่อจัดตำแหน่งภาพ</p>
            <div id="canvas-wrapper" class="w-full max-w-sm mb-4 mx-auto block">
                <!-- เปลี่ยนสัดส่วน Canvas เป็น 4:5 (1080 x 1350) -->
                <canvas id="photo-canvas" width="1080" height="1350"></canvas>
            </div>
            
            <!-- Zoom Control -->
            <div class="w-full max-w-sm mb-6 flex items-center justify-between gap-3">
                <span class="text-xl">🔍</span>
                <input type="range" id="zoom-slider" min="0.5" max="3" step="0.05" value="1" class="flex-grow">
                <span class="text-xl" style="transform: scale(1.3);">🔍</span>
            </div>
        </div>

        <!-- Frame Selection -->
        <h3 class="text-center font-bold text-nstda-blue mb-3 text-lg mt-4">✨ เลือกกรอบภาพรางวัล ✨</h3>
        <div id="frame-selector" class="flex overflow-x-auto hide-scrollbar space-x-3 pb-4 px-1 snap-x">
            <!-- Buttons dynamically generated by JS -->
        </div>

        <!-- Actions -->
        <div id="action-section" class="hidden mt-6 flex flex-col gap-3">
            <button id="btn-download" class="w-full bg-nstda-blue text-white py-3 rounded-xl font-medium shadow-md hover:bg-opacity-95 transition">
                💾 บันทึกรูปลงเครื่อง
            </button>
            <button id="btn-share" class="w-full border-2 border-traffy-brown text-traffy-brown py-3 rounded-xl font-medium shadow-sm hover:bg-gray-50 transition">
                📤 แชร์โซเชียลมีเดีย
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center mt-10 text-nstda-silver px-4 flex flex-col items-center">
        <p class="font-en font-semibold text-lg">Traffy Fondue Awards 2026</p>
        <p class="text-sm mt-1 mb-4 opacity-80">"เทคโนโลยีที่มีความหมาย เกิดจากพลังของทุกคน"</p>
    </footer>

    <!-- Logic Javascript -->
    <script>
        const awards = [
            { id: 0, name: "ผู้ร่วมขับเคลื่อนเมือง", color: "#714727", icon: "📣", quote: "We build a city for a better life", subline: "งานของเรา สร้างเมืองที่ดีกว่าเดิม", shareQuote: '" ภูมิใจที่ได้เป็นส่วนหนึ่งของสิ่งนี้ "' },
            { id: 1, name: "ทราฟฟี่ฟองดูว์ ทั้งจังหวัด", color: "#714727", icon: "🗺️", quote: "New Power, Better Solutions", subline: "ครอบคลุมทุกพื้นที่ ดูแลทุกเรื่องของประชาชน", shareQuote: '" เราดูแลทั้งจังหวัดด้วยกัน "' },
            { id: 2, name: "รับแจ้งเกิน 100,000 เคส", color: "#FFD700", icon: "🏆", quote: "Milestone of Trust and Dedication", subline: "ทุกเรื่องที่รับแจ้ง คือความไว้ใจที่เราไม่มองข้าม", shareQuote: '" แสนเคส แสนความตั้งใจ "' },
            { id: 3, name: "รับแจ้งเกิน 1,000,000 เคส", color: "#00744B", icon: "🏆", quote: "Milestone of Trust and Dedication", subline: "หนึ่งล้านเรื่อง หนึ่งล้านครั้งที่เราไม่ยอมแพ้", shareQuote: '" ล้านเคส ล้านความทุ่มเท "' },
            { id: 4, name: "เป็นเลิศรอบด้าน", color: "#2563EB", icon: "👑", quote: "You're the Best! The Ultimate Performer", subline: "ทำดีในทุกขั้นตอน เพราะประชาชนสมควรได้รับสิ่งที่ดีที่สุด", shareQuote: '" ทีมเรา ดีในทุกด้าน "' },
            { id: 5, name: "บริการตรงใจ", color: "#E91E63", icon: "❤️", quote: "Service with Heart, Solutions with Tech", subline: "รับฟังจริง ตอบสนองจริง นั่นคือมาตรฐานของทีมเรา", shareQuote: '" เราฟัง แล้วเราทำ "' },
            { id: 6, name: "แก้ไขฉับไว", color: "#F97316", icon: "⚡", quote: "Speed and Efficiency for Better Living", subline: "ยิ่งเร็ว ยิ่งแสดงว่าเราใส่ใจ", shareQuote: '" ทีมเราเร็ว เพราะเราใส่ใจ "' },
            { id: 7, name: "ใส่ใจพัฒนา", color: "#16A34A", icon: "📈", quote: "Never Stop Improving Our City", subline: "ไม่หยุดแค่ดีพอ เพราะบริการที่ดีกว่า สร้างได้เสมอ", shareQuote: '" เราพัฒนาทุกวัน เพื่อทุกคน "' }
        ];

        let selectedAwardIndex = 0;
        let uploadedImg = null;
        
        let canvas = document.getElementById("photo-canvas");
        let ctx = canvas.getContext("2d");
        
        // Image State
        let imgX = 0, imgY = 0, imgScale = 1;
        let isDragging = false, startX, startY;

        // Assets
        let logoNSTDA = new Image();
        let logoTraffy = new Image();
        
        logoNSTDA.src = 'logo-nstda.webp';
        logoTraffy.src = 'logo-traffy.webp';

        // Wait for fonts to load before initial render
        document.fonts.ready.then(() => {
            renderFrameButtons();
            drawCanvas();
        });

        // 1. Setup Frame Selection Buttons
        function renderFrameButtons() {
            const container = document.getElementById('frame-selector');
            container.innerHTML = '';
            
            awards.forEach((award, index) => {
                const btn = document.createElement('button');
                const isSelected = index === selectedAwardIndex;
                btn.className = `min-w-fit snap-center flex flex-col items-center px-4 py-2 rounded-xl transition ${isSelected ? 'bg-gray-100 shadow-inner' : 'hover:bg-gray-50'}`;
                btn.style.border = isSelected ? `2px solid ${award.color}` : '2px solid transparent';
                
                btn.innerHTML = `
                    <div class="text-2xl mb-1 flex items-center justify-center w-12 h-12 rounded-full text-white shadow-md" style="background-color: ${award.color}">${award.icon}</div>
                    <span class="text-xs font-semibold" style="color: ${isSelected ? award.color : '#64748b'}">${award.name}</span>
                `;
                
                btn.onclick = () => {
                    selectedAwardIndex = index;
                    renderFrameButtons();
                    drawCanvas();
                };
                container.appendChild(btn);
            });
        }

        // 2. Upload Handling
        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImg = new Image();
                uploadedImg.onload = function() {
                    // Reset positions
                    imgX = 0; imgY = 0;
                    // Auto-scale to fill width or height
                    const ratio = Math.max(canvas.width / uploadedImg.width, canvas.height / uploadedImg.height);
                    imgScale = ratio;
                    document.getElementById('zoom-slider').value = ratio;
                    // เซ็ตพิกัดเพื่อให้ซูมออกได้น้อยสุดเท่าที่ภาพเต็มจอพอดี
                    document.getElementById('zoom-slider').min = ratio * 0.5;
                    document.getElementById('zoom-slider').max = ratio * 3;
                    
                    // Center Image
                    imgX = (canvas.width - uploadedImg.width * imgScale) / 2;
                    imgY = (canvas.height - uploadedImg.height * imgScale) / 2;

                    document.getElementById('editor-section').classList.remove('hidden');
                    document.getElementById('action-section').classList.remove('hidden');
                    
                    // Change Upload Button Text
                    document.querySelector(`label[for="image-upload"]`).innerHTML = "🔄 เปลี่ยนรูปภาพใหม่";
                    document.querySelector(`label[for="image-upload"]`).className = "text-NSTDA text-sm underline cursor-pointer w-full text-nstda-blue";
                    
                    drawCanvas();
                }
                uploadedImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // 3. Zoom Logic
        document.getElementById('zoom-slider').addEventListener('input', function(e) {
            if(!uploadedImg) return;
            const newScale = parseFloat(e.target.value);
            
            // Zoom towards center
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            imgX = centerX - (centerX - imgX) * (newScale / imgScale);
            imgY = centerY - (centerY - imgY) * (newScale / imgScale);
            imgScale = newScale;
            drawCanvas();
        });

        // 4. Pan/Drag Logic
        const getMousePos = (evt) => {
            const rect = canvas.getBoundingClientRect();
            // Map screen coordinate to canvas coordinate
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = evt.clientX;
            let clientY = evt.clientY;
            
            if(evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        };

        const startPan = (e) => {
            if(!uploadedImg) return;
            e.preventDefault();
            const pos = getMousePos(e);
            isDragging = true;
            startX = pos.x - imgX;
            startY = pos.y - imgY;
        };

        const performPan = (e) => {
            if (!isDragging || !uploadedImg) return;
            e.preventDefault();
            const pos = getMousePos(e);
            imgX = pos.x - startX;
            imgY = pos.y - startY;
            drawCanvas();
        };

        const stopPan = () => { isDragging = false; };

        canvas.addEventListener('mousedown', startPan);
        canvas.addEventListener('mousemove', performPan);
        window.addEventListener('mouseup', stopPan);
        
        canvas.addEventListener('touchstart', startPan, {passive: false});
        canvas.addEventListener('touchmove', performPan, {passive: false});
        window.addEventListener('touchend', stopPan);

        // 5. Draw Canvas Engine
        function drawCanvas() {
            const award = awards[selectedAwardIndex];
            
            // 5.1 Clear & Draw Base Image
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (uploadedImg) {
                ctx.drawImage(uploadedImg, imgX, imgY, uploadedImg.width * imgScale, uploadedImg.height * imgScale);
            } else {
                ctx.fillStyle = '#e2e8f0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#94a3b8';
                ctx.font = '40px Prompt';
                ctx.textAlign = 'center';
                ctx.fillText('กรุณาอัปโหลดรูปภาพ', canvas.width/2, canvas.height/2);
            }

            // 5.2 Draw Bottom Gradient Overlay (ปรับให้สูงขึ้น รองรับข้อความเยอะ)
            const gradient = ctx.createLinearGradient(0, canvas.height - 550, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(0.3, 'rgba(0,0,0,0.6)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.9)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height - 550, canvas.width, 550);

            // 5.3 Draw Top Gradient for Logos
            const topGradient = ctx.createLinearGradient(0, 0, 0, 250);
            topGradient.addColorStop(0, 'rgba(255,255,255,1)');
            topGradient.addColorStop(0.6, 'rgba(255,255,255,0.7)');
            topGradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = topGradient;
            ctx.fillRect(0, 0, canvas.width, 250);

            // 5.4 Draw Logos
            if(logoNSTDA.complete && logoNSTDA.naturalHeight !== 0) {
                const ratio = logoNSTDA.width / logoNSTDA.height;
                ctx.drawImage(logoNSTDA, 40, 40, 60 * ratio, 60); 
            }
            if(logoTraffy.complete && logoTraffy.naturalHeight !== 0) {
                 const ratio = logoTraffy.width / logoTraffy.height;
                ctx.drawImage(logoTraffy, canvas.width - (80 * ratio) - 50, 30, 80 * ratio, 80);
            }

            // 5.5 Draw Dynamic Border
            ctx.lineWidth = 35;
            ctx.strokeStyle = award.color;
            ctx.strokeRect(ctx.lineWidth/2, ctx.lineWidth/2, canvas.width - ctx.lineWidth, canvas.height - ctx.lineWidth);
            
            // ขอบด้านในสีทอง/เงิน เพิ่มความหรูหรา
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#ffffff';
            ctx.strokeRect(35, 35, canvas.width - 70, canvas.height - 70);

            // 5.6 Draw Ribbon (ย้ายลงมาด้านล่าง เหนือชื่อรางวัล) 
            ctx.fillStyle = award.color;
            ctx.beginPath();
            ctx.roundRect(canvas.width/2 - 250, canvas.height - 370, 500, 60, 30);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '500 28px Prompt';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('ขอเชิดชูเกียรติหน่วยงานดีเด่น', canvas.width/2, canvas.height - 339);

            // 5.7 Draw Award Name Ribbon (Centered)
            const iconText = `${award.icon}  ${award.name}`;
            ctx.font = 'bold 50px Prompt';
            const textWidth = ctx.measureText(iconText).width;
            const padX = 70;
            const boxWidth = textWidth + padX;
            
            // วาดพื้นหลังชื่อรางวัล
            ctx.fillStyle = award.color;
            ctx.beginPath();
            ctx.roundRect((canvas.width - boxWidth)/2, canvas.height - 290, boxWidth, 100, 50);
            ctx.fill();
            
            // ขอบชื่อรางวัล
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            // ข้อความชื่อรางวัล
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(iconText, canvas.width/2, canvas.height - 235);

            // 5.8 Draw Quote (English)
            ctx.fillStyle = '#cbd5e1'; // Silver
            ctx.font = 'italic 400 28px Montserrat';
            ctx.fillText(`"${award.quote}"`, canvas.width/2, canvas.height - 130);

            // 5.9 Draw Event Name
            ctx.fillStyle = '#ffffff';
            ctx.font = '700 34px Montserrat';
            ctx.letterSpacing = "2px";
            ctx.fillText('TRAFFY FONDUE AWARDS 2026', canvas.width/2, canvas.height - 70);
        }

        // 6. Download Logic
        document.getElementById('btn-download').addEventListener('click', () => {
            if(!uploadedImg) return alert('กรุณาอัปโหลดรูปภาพก่อนครับ');
            const link = document.createElement('custom'); 
            const a = document.createElement('a'); 
            a.download = `Traffy_Awards_${awards[selectedAwardIndex].name}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        });

        // 7. Share Logic (Web Share API)
        document.getElementById('btn-share').addEventListener('click', async () => {
            if(!uploadedImg) return alert('กรุณาอัปโหลดรูปภาพก่อนครับ');
            
            const award = awards[selectedAwardIndex];
            const shareText = `ภูมิใจที่ทีมเราได้รับรางวัล ${award.name}\n${award.subline}\n${award.shareQuote}\n\n#TraffyFondueAwards #สวทช`;

            try {
                if (navigator.share) {
                    // สร้างไฟล์เพื่อทดสอบรองรับการแชร์รูป
                    canvas.toBlob(async (blob) => {
                        const file = new File([blob], "award.png", { type: "image/png" });
                        const shareData = {
                            title: `รางวัล ${award.name} - Traffy Fondue`,
                            text: shareText,
                        };
                        
                        // Check if file sharing is supported
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            shareData.files = [file];
                        }
                        
                        await navigator.share(shareData);
                    }, 'image/png');
                } else {
                    // Fallback สำหรับกรณี Browser ไม่รองรับการแชร์แบบ Native
                    navigator.clipboard.writeText(shareText);
                    alert("คัดลอกข้อความสำหรับแชร์แล้ว! กรุณากด 'บันทึกรูปลงเครื่อง' แล้วนำไปโพสต์ได้เลยครับ");
                }
            } catch (err) {
                console.log("Error sharing", err);
            }
        });

        // Ensure logos trigger redraw if loaded late
        logoNSTDA.onload = drawCanvas;
        logoTraffy.onload = drawCanvas;

    </script>
</body>
</html>

                        </body>
                        </html>
